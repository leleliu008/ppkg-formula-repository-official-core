summary: A text shaping engine. It primarily supports OpenType, but also Apple Advanced Typography
src-url: https://github.com/harfbuzz/harfbuzz/releases/download/14.2.1/harfbuzz-14.2.1.tar.xz
src-sha: a54a5d8e9380a41fbb762ce367bcbf7704792dfca0d93f1bbca86c5a57902e0e
dep-pkg: glib-gir libicu libcairo libgraphite2
license: MIT

install: |
    mesonw \
        -Dicu=enabled \
        -Dglib=enabled \
        -Dcairo=enabled \
        -Dcoretext=enabled \
        -Dfreetype=enabled \
        -Dgraphite=disabled \
        -Dgraphite2=enabled \
        -Dgobject=enabled \
        -Dintrospection=enabled \
        -Ddocs=disabled \
        -Dtests=disabled \
        -Dutilities=disabled \
        -Dbenchmark=disabled
