linkage: shared
summary: The LLVM Linker
web-url: https://lld.llvm.org/
src-url: https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.8/llvm-project-22.1.8.src.tar.xz
src-sha: 922f1817a0df7b1489272d18134ee0087a8b068828f87ac63b9861b1a9965888
license: Apache-2.0 with LLVM-exception
dep-pkg: libllvm@22
bscript: lld

install: |
    cmakew \
        -DLLVM_INCLUDE_TESTS=OFF \
        -DLLVM_USE_SYMLINKS=ON \
        -DLLVM_ENABLE_LTO=ON \
        -DLLD_BUILD_TOOLS=ON \
        -DLLD_BUILT_STANDALONE=ON \
        -DBUILD_SHARED_LIBS=OFF
