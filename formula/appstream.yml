summary: A command-line utility to work with AppStream metadata
web-url: https://www.freedesktop.org/wiki/Distributions/AppStream/
src-url: https://github.com/ximion/appstream/archive/refs/tags/v1.1.2.tar.gz
src-sha: 564ec87b16e9e4ee81fb021e612250fd27f3a3ecd31c209a5dd1ff59def3022d
license: LGPL-2.1-or-later
dep-pkg: libxmlb libxml2 libfyaml libcurl
dep-upp: gettext-tools itstool xsltproc docbook-xsl gperf

dopatch: |
    gsed -i '/tests/d' meson.build

    if [ "$TARGET_PLATFORM_NAME" = macos ] ; then
        export LDFLAGS="$LDFLAGS -framework CoreFoundation -framework SystemConfiguration"
    fi

install: |
    mesonw \
        -Dsystemd=false \
        -Dstemming=false \
        -Dvapi=true \
        -Dgir=false \
        -Ddocs=false \
        -Dapidocs=false \
        -Dinstall-docs=false \
        -Dbash-completion=false

dotweak: run rm -rf include/ lib/
