linkage: shared
summary: GNU binary tools for native development
git-url: https://sourceware.org/git/binutils-gdb
src-url: https://ftp.gnu.org/gnu/binutils/binutils-2.46.1.tar.bz2
src-sha: 324ed40ada2633a28eaa5d104ca5db165fd3cc3162cc1d48a7b7fa9c932da439
license: GPL-2.0-or-later
dep-pkg: libisl libmpc libz libzstd
dep-upp: gm4 bison texinfo

install: |
    configure \
        --with-isl="$libisl_INSTALL_DIR" \
        --with-gmp="$libgmp_INSTALL_DIR" \
        --with-mpc="$libmpc_INSTALL_DIR" \
        --with-mpfr="$libmpfr_INSTALL_DIR" \
        --with-static-standard-libraries \
        --with-zstd \
        --with-system-zlib \
        --disable-gprofng \
        --disable-werror \
        --disable-nls \
        --disable-install-libbfd \
        --disable-shared \
        --enable-static \
        --enable-gold \
        --enable-64-bit-bfd \
        --enable-plugins \
        --enable-interwork \
        --enable-multilib \
        --enable-targets=all
