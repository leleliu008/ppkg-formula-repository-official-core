summary: XML 1.0 parser
web-url: https://libexpat.github.io
src-url: https://github.com/libexpat/libexpat/releases/download/R_2_8_1/expat-2.8.1.tar.xz
src-sha: 10b195ee78160a908388180a8fe3603d4e9a12f4755fbf5f3816b23a9d750da0
license: MIT

install: |
    cmakew \
        -DEXPAT_BUILD_DOCS=OFF \
        -DEXPAT_BUILD_TOOLS=ON \
        -DEXPAT_BUILD_TESTS=OFF \
        -DEXPAT_BUILD_FUZZERS=OFF \
        -DEXPAT_BUILD_EXAMPLES=OFF \
        -DEXPAT_SHARED_LIBS=OFF \
        -DEXPAT_ENABLE_INSTALL=OFF
    install_bins xmlwf/xmlwf
    install_mans "$PACKAGE_WORKING_DIR/src/doc/xmlwf.1"
