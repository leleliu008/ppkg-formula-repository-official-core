summary: GNU multiple precision arithmetic library
web-url: https://gmplib.org/
src-url: https://ftp.gnu.org/gnu/gmp/gmp-6.3.0.tar.xz
src-sha: a3c2b80201b89e68616f4ad30bc66aee4927c3ce50e33929ca819d5c43538898
license: LGPL-3.0-or-later
dep-upp: libtool gm4
bsystem: autotools

fix-url: https://gitlab.alpinelinux.org/alpine/aports/-/raw/master/main/gmp/gcc15.patch
fix-sha: fd0f1b48dbe72413efbd9c45f1ca7013d555f46c578446ce3ba202e3a9b96c6c

prepare: |
    cd ../bin

    cat > m4 <<EOF
    #!/bin/sh
    exec "$M4" -DPIC "\$@"
    EOF

    chmod +x m4

    export M4="$PWD/m4"

install: |
    configure \
        --with-pic \
        --without-readline \
        --disable-profiling \
        --disable-assert \
        --disable-cxx \
        --enable-assembly \
        --enable-fft
