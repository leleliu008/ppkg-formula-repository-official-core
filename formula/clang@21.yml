linkage: shared
summary: A C language family frontend for LLVM
web-url: https://clang.llvm.org/
src-url: https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.8/llvm-project-21.1.8.src.tar.xz
src-sha: 4633a23617fa31a3ea51242586ea7fb1da7140e426bd62fc164261fe036aa142
license: Apache-2.0 with LLVM-exception
dep-pkg: libllvm@21
dep-upp: python3
bscript: clang

install: |
    cmakew \
        -DBUILD_SHARED_LIBS=OFF \
        -DLLVM_INCLUDE_TESTS=OFF \
        -DLLVM_ENABLE_LTO=ON \
        -DCLANG_BUILD_TOOLS=ON \
        -DCLANG_BUILD_EXAMPLES=OFF \
        -DCLANG_BUILT_STANDALONE=ON \
        -DCLANG_FORCE_MATCHING_LIBCLANG_SOVERSION=OFF
