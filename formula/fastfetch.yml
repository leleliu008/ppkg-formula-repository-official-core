summary: Like neofetch, but much faster because written mostly in C
src-url: https://github.com/fastfetch-cli/fastfetch/archive/refs/tags/2.65.2.tar.gz
src-sha: d0b318c33cf6c8bbae1162325f91624762a040a60f748941cbf1b4b99a75fa30
license: MIT
dep-pkg: libchafa libopencl libvulkan libsqlite3
dep-upp: python3

install: |
    cmakew \
        -DENABLE_FREETYPE=ON \
        -DENABLE_SQLITE3=ON \
        -DENABLE_WAYLAND=ON \
        -DENABLE_XCB_RANDR=ON \
        -DENABLE_XRANDR=ON \
        -DENABLE_OPENCL=ON \
        -DENABLE_VULKAN=ON \
        -DENABLE_CHAFA=ON \
        -DENABLE_ZLIB=ON \
        -DENABLE_RPM=OFF \
        -DENABLE_LTO=OFF \
        -DENABLE_ASAN=OFF \
        -DBUILD_TESTS=OFF
