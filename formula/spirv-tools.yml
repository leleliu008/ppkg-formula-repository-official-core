summary: API and commands for processing SPIR-V modules
src-url: https://github.com/KhronosGroup/SPIRV-Tools/archive/refs/tags/vulkan-sdk-1.4.341.0.tar.gz
src-sha: 15bfb678138cdf9cd1480dfb952547bbb66b763a735b6d5582578572f5c2e6f9
license: Apache-2.0
dep-upp: python3
dep-pkg: spirv-headers

install: |
    cmakew \
        -DENABLE_RTTI=OFF \
        -DSPIRV_WERROR=ON \
        -DSPIRV_BUILD_FUZZER=OFF \
        -DSPIRV_SKIP_TESTS=ON \
        -DSPIRV_SKIP_EXECUTABLES=OFF \
        -DSPIRV_TOOLS_BUILD_STATIC=OFF \
        -DSPIRV_COLOR_TERMINAL=ON \
        -DSPIRV_LOG_DEBUG=OFF \
        -DSKIP_SPIRV_TOOLS_INSTALL=OFF \
        -DSPIRV-Headers_SOURCE_DIR=$spirv_headers_INSTALL_DIR
