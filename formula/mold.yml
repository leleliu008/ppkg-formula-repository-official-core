summary: Modern Linker
src-url: https://github.com/rui314/mold/archive/refs/tags/v2.41.0.tar.gz
src-sha: 0a61abac85d818437b425df856822e9d6e9982baeae5a93bcb02fe6c0060c61a
license: MIT

dopatch: |
    if [ "$TARGET_PLATFORM_NAME" = netbsd ] ; then
        gsed -i 's|__OpenBSD__|__NetBSD__|' elf/mold-wrapper.c
    fi

    gsed -i 's|if(MOLD_MOSTLY_STATIC)|if(TRUE)|' CMakeLists.txt

install: |
    cmakew \
        -DMOLD_LTO=ON \
        -DMOLD_USE_ASAN=OFF \
        -DMOLD_USE_TSAN=OFF \
        -DMOLD_USE_MIMALLOC=ON \
        -DMOLD_MOSTLY_STATIC=OFF \
        -DBUILD_SHARED_LIBS=OFF \
        -DCMAKE_SKIP_INSTALL_RULES=OFF
