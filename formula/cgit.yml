summary: A hyperfast web frontend for Git repositories written in C
web-url: https://git.zx2c4.com/cgit
src-url: https://git.zx2c4.com/cgit/snapshot/cgit-1.3.1.tar.xz
src-sha: c40fd71e120783d5e57d822208f3e17333cde2cd4baf3e7c8c75630b68afe12a
license: GPL-2.0-only
dep-pkg: libopenssl libz

res-url: https://www.kernel.org/pub/software/scm/git/git-2.54.0.tar.xz
res-sha: f689162364c10de79ef89aa8dbf48731eb057e34edbbd20aca510ce0154681a3

fix-url: https://raw.githubusercontent.com/Homebrew/homebrew-core/1cf441a0/Patches/cgit/memrchr-impl.patch
fix-sha: 3ab5044db3001b411b58309d70f00b0dee54df991ebc66da9406711ed4007f0f

dopatch: gsed -i "/ALL_LDFLAGS/s|$| $CFLAGS $CPPFLAGS $LDFLAGS|" cgit.mk

prepare: run mv ../res/* git/

install: |
    export ac_cv_header_libintl_h=no
    gmakew clean
    gmakew
    gmakew install \
        prefix=$PACKAGE_INSTALL_DIR \
        CGIT_SCRIPT_PATH=$PACKAGE_INSTALL_DIR/var/www \
        CGIT_DATA_PATH=$PACKAGE_INSTALL_DIR/var/www \
        CGIT_CONFIG=$PACKAGE_INSTALL_DIR/etc/cgitrc \
        CACHE_ROOT=$PACKAGE_INSTALL_DIR/var/cache
