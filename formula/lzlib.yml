summary: Data compression library
web-url: https://www.nongnu.org/lzip/lzlib.html
src-url: https://download.savannah.gnu.org/releases/lzip/lzlib/lzlib-1.16.tar.gz
src-sha: 203228de911780309dad6813e51541d7ea89469784f01cb661edba080ff1b038
license: BSD-2-Clause

dopatch: gsed -i 's|$(progname_shared)|lib$(libname).so.$(pkgversion)|' Makefile.in

install: |
    run ./configure --enable-static --enable-shared --disable-ldconfig --prefix="$PACKAGE_INSTALL_DIR" CC="$CC" CFLAGS="'$CFLAGS'" CPPFLAGS="'$CPPFLAGS'" LDFLAGS="'$LDFLAGS'" AR="$AR"
    gmakew
    gmakew install
