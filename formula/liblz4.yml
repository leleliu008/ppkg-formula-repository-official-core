summary: Extremely Fast Compression algorithm
web-url: http://www.lz4.org/
src-url: https://github.com/lz4/lz4/archive/refs/tags/v1.10.0.tar.gz
src-sha: 537512904744b35e232912055ccf8ec66d768639ff3abe5788d90d792ec5f48b
license: BSD-2-Clause
bscript: lib

prepare: |
    case $TARGET_PLATFORM_NAME in
        linux)
            TARGET_PLATFORM_UNAME=Linux
            ;;
        macos)
            TARGET_PLATFORM_UNAME=Darwin
            ;;
        *)  TARGET_PLATFORM_UNAME=
    esac

    GMAKE_COMMON_ARGS="V=1 TARGET_OS=$TARGET_PLATFORM_UNAME"

install: |
    gmakew clean   "$GMAKE_COMMON_ARGS"
    gmakew         "$GMAKE_COMMON_ARGS" BUILD_STATIC=yes BUILD_SHARED=yes PREFIX="$PACKAGE_INSTALL_DIR" PKGCONFIGDIR="$PACKAGE_INSTALL_DIR/lib/pkgconfig"
    gmakew install "$GMAKE_COMMON_ARGS" BUILD_STATIC=yes BUILD_SHARED=yes PREFIX="$PACKAGE_INSTALL_DIR" PKGCONFIGDIR="$PACKAGE_INSTALL_DIR/lib/pkgconfig"
