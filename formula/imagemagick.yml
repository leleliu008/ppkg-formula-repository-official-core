pkgtype: exe+lib
summary: Tools and libraries to manipulate images in many formats
web-url: https://imagemagick.org/
src-url: https://github.com/ImageMagick/ImageMagick/releases/download/7.1.2-26/ImageMagick-7.1.2-26.7z
src-sha: 87aceeed7448836b0f729eddca6d7c5bad8b8e95c043cb6b1b2f72247189edcf
version: 7.1.2.26
license: ImageMagick
dep-pkg: libgs libpango libxml2 libfftw3 libraw liblqr libheif libltdl

install: |
    configure \
        --with-freetype \
        --with-gvc=no \
        --with-modules \
        --with-threads \
        --with-openjp2 \
        --with-openexr \
        --with-gslib \
        --with-pango \
        --with-hdri \
        --with-fftw \
        --with-heic \
        --with-rsvg \
        --with-tiff \
        --with-webp \
        --with-png \
        --with-lqr \
        --with-xml \
        --with-x \
        --without-wmf \
        --without-fftw \
        --disable-opencl

# https://imagemagick.org/script/resources.php#environment
bindenv: |
    MAGICK_HOME=%s
    MAGICK_CODER_MODULE_PATH=%s/lib/ImageMagick-7.1.2/modules-Q16HDRI/coders
    MAGICK_CONFIGURE_PATH=%s/etc/ImageMagick-7
