summary: A command-line tool for drawing graphs
web-url: https://www.graphviz.org/
git-url: https://gitlab.com/graphviz/graphviz
src-url: https://gitlab.com/api/v4/projects/4207231/packages/generic/graphviz-releases/15.0.0/graphviz-15.0.0.tar.xz
src-sha: 937fe4757687260e46a1c9a171cc677e3d4c89abd1efc8885ccb66467c3616ff
license: EPL-1.0
dep-pkg: librsvg libgd
dep-upp: libtool gm4 flex bison gawk git python3

prepare: |
    if [ "$TARGET_PLATFORM_NAME" != macos ] ; then
        export LDFLAGS="$LDFLAGS --static -static"
    fi

install: |
    configure only \
        --disable-swig \
        --disable-php \
        --disable-tcl \
        --without-gdk \
        --without-gtk \
        --without-qt \
        --without-x \
        --with-freetype2 \
        --with-gdk-pixbuf
    gmakew
    gmakew -C cmd/dot dot_static
    install_bins cmd/dot/dot_static
