summary: A command-line tool that performs content-preserving transformations on PDF files
src-url: https://github.com/qpdf/qpdf/releases/download/v12.3.2/qpdf-12.3.2.tar.gz
src-sha: 6cba2f9f2cd887d905faeb99e0e51a307b217920d1bbf3e9cfbb2e8178a2deda
license: Apache-2.0
dep-pkg: libjpeg-turbo libopenssl libz

# https://qpdf.readthedocs.io/en/stable/installation.html
install: |
    cmakew \
        -DINSTALL_MANUAL=OFF \
        -DINSTALL_EXAMPLES=OFF \
        -DINSTALL_PKGCONFIG=OFF \
        -DINSTALL_CMAKE_PACKAGE=OFF \
        -DBUILD_DOC=OFF \
        -DBUILD_SHARED_LIBS=OFF \
        -DBUILD_STATIC_LIBS=ON \
        -DUSE_IMPLICIT_CRYPTO=OFF \
        -DREQUIRE_CRYPTO_OPENSSL=ON \
        --components=cli,doc
