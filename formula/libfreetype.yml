summary: C library to render fonts
web-url: https://freetype.org/
git-url: https://gitlab.freedesktop.org/freetype/freetype
src-url: https://downloads.sourceforge.net/project/freetype/freetype2/2.14.3/freetype-2.14.3.tar.xz
src-sha: 36bc4f1cc413335368ee656c42afca65c5a3987e8768cc28cf11ba775e785a5f
dep-pkg: libbrotli libbz2 libpng
license: FTL

install: |
    mesonw \
        -Dbrotli=enabled \
        -Dbzip2=enabled \
        -Dzlib=enabled \
        -Dpng=enabled \
        -Dharfbuzz=disabled \
        -Dtests=disabled
