linkage: shared
summary: A C language family frontend for LLVM
web-url: https://clang.llvm.org/
src-url: https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.8/llvm-project-22.1.8.src.tar.xz
src-sha: 922f1817a0df7b1489272d18134ee0087a8b068828f87ac63b9861b1a9965888
license: Apache-2.0 with LLVM-exception
dep-pkg: libllvm@22
dep-upp: python3
bscript: clang

install: |
    cmakew \
        -DBUILD_SHARED_LIBS=OFF \
        -DLLVM_ENABLE_LTO=ON \
        -DLLVM_INCLUDE_DOCS=OFF \
        -DLLVM_INCLUDE_TESTS=OFF \
        -DCLANG_ENABLE_LIBXML2=OFF \
        -DCLANG_BUILD_TOOLS=ON \
        -DCLANG_BUILD_EXAMPLES=OFF \
        -DCLANG_BUILT_STANDALONE=ON \
        -DCLANG_DEFAULT_PIE_ON_LINUX=ON \
        -DCLANG_FORCE_MATCHING_LIBCLANG_SOVERSION=OFF
