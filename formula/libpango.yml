summary: library for laying out and rendering of text, with an emphasis on internationalization
web-url: https://www.pango.org/
src-url: https://download.gnome.org/sources/pango/1.57/pango-1.57.1.tar.xz
src-sha: e65d6d117080dc3aeeb7d8b4b3b518f7383aa2e6cfce23117c623cd624764c2f
license: LGPL-2.0-or-later
dep-pkg: libfribidi libharfbuzz libxft
dep-upp: glib-tools

install: |
    mesonw \
        -Ddocumentation=false \
        -Dbuild-examples=false \
        -Dbuild-testsuite=false \
        -Dlibthai=disabled \
        -Dxft=enabled \
        -Dcairo=enabled \
        -Dfreetype=enabled \
        -Dfontconfig=enabled \
        -Dintrospection=enabled
