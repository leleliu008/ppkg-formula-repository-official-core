summary: GNU File, Shell, and Text utilities
git-url: https://github.com/coreutils/coreutils
src-url: https://ftp.gnu.org/gnu/coreutils/coreutils-9.11.tar.xz
src-sha: 394024eda0a5955217ceda9cd1201e65dc8fa3aa29c2951135a49521d57c3cc3
license: GPL-3.0-or-later
dep-pkg: libgmp

install: |
    configure \
        --with-included-regex \
        --with-linux-crypto \
        --with-gmp \
        --without-openssl \
        --without-selinux \
        --disable-libcap \
        --disable-libsmack \
        --disable-assert \
        --disable-gcc-warnings \
        --disable-acl \
        --enable-xattr \
        --enable-threads=posix

dotweak: |
    if [ "$PACKAGE_CREATE_FULLY_STATICALLY_LINKED_EXECUTABLE" = 1 ] ; then
        run rm bin/stdbuf
        run rm libexec/coreutils/libstdbuf.so
        run rmdir libexec/coreutils/
        run rmdir libexec/
    fi
