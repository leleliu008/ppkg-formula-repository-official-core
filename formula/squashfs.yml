summary: tools to create and extract Squashfs filesystems
src-url: https://github.com/plougher/squashfs-tools/archive/refs/tags/4.7.5.tar.gz
src-sha: 547b7b7f4d2e44bf91b6fc554664850c69563701deab9fd9cd7e21f694c88ea6
license: GPL-2.0-or-later
dep-pkg: liblz4 liblzo libzstd liblzma libz
dep-upp: help2man
bscript: squashfs-tools
install: |
    gmakew clean
    gmakew \
        LZMA_XZ_SUPPORT=1 \
        XZ_SUPPORT=1 \
        LZ4_SUPPORT=1 \
        LZO_SUPPORT=1 \
        ZSTD_SUPPORT=1 \
        GZIP_SUPPORT=1 \
        XATTR_SUPPORT=1
    gmakew install INSTALL_PREFIX="$PACKAGE_INSTALL_DIR"
