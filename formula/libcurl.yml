summary: A free and easy-to-use client-side URL transfer library
git-url: https://github.com/curl/curl
web-url: https://curl.se/
src-url: https://curl.se/download/curl-8.20.0.tar.bz2
src-sha: 4be48e69cf467246cb97d369b85d78a08528f2b37cffef2418ee16e6a4eb596e
license: curl
dep-upp: perl
dep-pkg: libnghttp2 libopenssl libbrotli libzstd libz

dopatch: |
    gsed -i '/^SUBDIRS = /s| src||' Makefile.in

    # https://gitlab.com/qemu-project/qemu/-/issues/2485
    if [ "$TARGET_PLATFORM_ARCH" = s390x ] ; then
        gsed -i '/tst_links_getifaddrs=/c tst_links_getifaddrs=no' configure
    fi

    if [ "$TARGET_PLATFORM_NAME" = netbsd ] && [ "$TARGET_PLATFORM_VERS" = '10.0' ] ; then
        gsed -i '/unknown unknown unknown unknown/i set -x; command -v wc || echo "command not found: wc"' configure
        gsed -i 's|x4)|*)|' configure
    fi

install: |
    configure \
        --enable-optimize \
        --enable-pthreads \
        --with-default-ssl-backend=openssl \
        --with-ssl="$libopenssl_INSTALL_DIR" \
        --with-nghttp2 \
        --without-nghttp3 \
        --without-ngtcp2 \
        --without-quiche \
        --without-libpsl \
        --without-librtmp \
        --without-libidn2 \
        --disable-ldap \
        --disable-ldaps

dotweak: |
    run rm share/man/man1/curl.1

    gsed -i '/Libs.private:/d' lib/pkgconfig/libcurl.pc

    if [ "$TARGET_PLATFORM_NAME" = macos ] ; then
        gsed -i '/^Libs:/s|$| -framework CoreFoundation -framework SystemConfiguration|' lib/pkgconfig/libcurl.pc
    fi
