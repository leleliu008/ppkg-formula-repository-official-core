summary: Common error values for all GnuPG components
web-url: https://www.gnupg.org/related_software/libgpg-error
git-url: https://dev.gnupg.org/source/libgpg-error
src-url: https://gnupg.org/ftp/gcrypt/libgpg-error/libgpg-error-1.61.tar.bz2
src-sha: 7a85413f2bc354f4f8aa832b718af122e48965e9e0eb9012ee659c13c6385c93
license: LGPL-2.1-or-later

install: |
    configure \
        --disable-build-timestamp \
        --disable-languages \
        --disable-werror \
        --disable-tests \
        --enable-doc \
        --enable-threads=posix \
        --enable-install-gpg-error-config
